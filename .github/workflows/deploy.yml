name: Deploy Self-Hosted

on:
  push:
    branches:
      - main
  repository_dispatch:  
      types: [cms_update]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: 🛡️ Nascondi dati sensibili
      run: |
        # Maschera il percorso e l'utente nei log
        echo "::add-mask::${{ secrets.TARGET_DIR }}"
        echo "::add-mask::/home/eno"
        echo "::add-mask::webserver-ubuntu"

    - name: 🚚 Scarica il codice
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: 📦 Installa dipendenze
      run: npm ci

    - name: 🛠️ Build del progetto
      run: npm run build
      env:
        PUBLIC_WP_API_URL: ${{ secrets.PUBLIC_WP_API_URL }}
        PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.CAPTCHA_SITE_KEY }}
        PUBLIC_GTM_ID: ${{ secrets.PUBLIC_GTM_ID }}

    - name: 🚀 Pubblica sul Server
      run: |
        # Usa il segreto invece del percorso scritto in chiaro
        TARGET_DIR="${{ secrets.TARGET_DIR }}"

        echo "Sto copiando i file in $TARGET_DIR..."
        
        mkdir -p "$TARGET_DIR"
        
        # Rimuovo -v (verbose) per evitare che stampi ogni singolo file nei log pubblici
        cp -r dist/* "$TARGET_DIR/"
        
        echo "✅ Deploy completato!"